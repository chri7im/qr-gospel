<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#264b6e"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle light glow behind the cross -->
  <ellipse cx="600" cy="260" rx="120" ry="160" fill="#ffffff" opacity="0.04"/>

  <!-- Cross -->
  <rect x="572" y="100" width="56" height="280" rx="6" fill="#ffffff"/>
  <rect x="500" y="170" width="200" height="56" rx="6" fill="#ffffff"/>

  <!-- "Good News" text -->
  <text x="600" y="460" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="64" font-weight="bold"
        fill="#ffffff" letter-spacing="3">Good News</text>

  <!-- "qr-gospel.com" text -->
  <text x="600" y="530" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        fill="#8494a7" letter-spacing="2">qr-gospel.com</text>
</svg>
